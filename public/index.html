<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 Anthost Pages</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background: #0a1128; 
            font-family: 'Segoe UI', sans-serif;
        }

        #chat-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a1128;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        #coffe-header {
            height: 60px;
            background: #1c2541;
            border-bottom: 4px solid #0052ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .logo {
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .logo span { color: #00d2ff; }

        /* ÁREA DE DEPLOY INSTANTÂNEO */
        .deploy-box {
            background: #1c2541;
            border: 2px dashed #00d2ff;
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
            color: #d7ccc8;
        }

        .deploy-box h3 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .deploy-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }

        .deploy-group input[type="text"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3a506b;
            background: #0a1128;
            color: white;
            outline: none;
        }

        .deploy-group input[type="file"] {
            color: #d7ccc8;
            font-size: 13px;
        }

        .btn-deploy {
            background: #00d2ff;
            color: #0a1128;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .btn-deploy:hover {
            background: #0052ff;
            color: white;
            transform: scale(1.02);
        }

        /* ÁREA DE RESULTADO DO DEPLOY */
        #result-area {
            margin-top: 10px;
            padding: 12px;
            background: #0a1128;
            border-radius: 6px;
            border: 1px solid #3a506b;
            display: none;
        }

        #link-container a {
            color: #00d2ff;
            font-weight: bold;
            text-decoration: none;
        }
        #link-container a:hover {
            text-decoration: underline;
        }

        /* CORPO DO CHAT */
        #chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 11px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.ai {
            background: #1c2541;
            color: #f1f5f5;
            align-self: flex-start;
            border-left: 4px solid #00d2ff;
        }

        .message.user {
            background: #0052ff;
            color: white;
            align-self: flex-end;
        }

        /* RODAPÉ E ENTRADA (MANTIDO E ADAPTADO AO NOVO DESIGN) */
        #chat-footer {
            padding: 15px;
            background: #1c2541;
            border-top: 4px solid #0052ff;
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            gap: 10px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        #coffe-input {
            flex-grow: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #3a506b;
            background: #0a1128;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #btn-send {
            background: #0052ff;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #btn-send:hover {
            background: #00d2ff;
            color: #0a1128;
        }

        #status-bar {
            text-align: center;
            color: #3a506b;
            font-size: 11px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div id="chat-mode">
        <header id="coffe-header">
            <div class="logo">Anthost <span>Pages</span></div>
        </header>

        <div class="deploy-box">
            <h3>Dê-nos o nome e o arquivo HTML</h3>
            <div class="deploy-group">
                <input type="text" id="project-name" placeholder="Nome do projeto (ex: meu-site-veloz)" autocomplete="off">
                <input type="file" id="html-file" accept=".html">
            </div>
            <button class="btn-deploy" onclick="hospedarSite()">Subir o site</button>

            <div id="result-area">
                <p id="status-text" style="font-weight: bold; color: #00d2ff; margin-bottom: 5px;">Processando...</p>
                <div id="link-container"></div>
            </div>
        </div>

        <div id="chat-messages">
            <div class="message ai">
                Olá! Eu sou o Anthost Pages. Gostaria de hospedar o seu site no nosso servidor? Basta usar o painel acima! 🚀
            </div>
        </div>

        <footer id="chat-footer">
            <div class="input-wrap">
                <input type="text" id="coffe-input" placeholder="Digite uma mensagem para o Anthost..." autocomplete="off">
                <button id="btn-send" onclick="enviarComando()">Enviar</button>
            </div>
            <div id="status-bar">🚀 Anthost Engine v1.0 | Sistema Pronto</div>
        </footer>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('coffe-input');
        const statusBar = document.getElementById('status-bar');

        // ============================================
        // FUNÇÃO DO BOTÃO DE DEPLOY
        // ============================================
        async function hospedarSite() {
            const nomeProjeto = document.getElementById('project-name').value.trim();
            const inputFicheiro = document.getElementById('html-file');
            const areaResultado = document.getElementById('result-area');
            const textoStatus = document.getElementById('status-text');
            const containerLink = document.getElementById('link-container');

            if (!nomeProjeto) {
                alert('Por favor, digita um nome para o teu projeto!');
                return;
            }
            if (inputFicheiro.files.length === 0) {
                alert('Por favor, seleciona um ficheiro .html do teu computador!');
                return;
            }

            const ficheiro = inputFicheiro.files[0];

            areaResultado.style.display = 'block';
            textoStatus.innerText = '⏳ Conectando ao Anthost Engine...';
            containerLink.innerHTML = '';

            const formData = new FormData();
            formData.append('projectName', nomeProjeto);
            formData.append('html', ficheiro);

            try {
                const resposta = await fetch('/api/sites/upload', {
                    method: 'POST',
                    body: formData
                });

                const resultado = await resposta.json();

                if (resultado.success) {
                    textoStatus.innerText = '✅ DEPLOY CONCLUÍDO COM SUCESSO!';
                    containerLink.innerHTML = `
                        <p style="margin-top: 5px; color: #fff;">O teu site já está online no link:</p>
                        <p style="margin-top: 8px; font-size: 16px;">
                            <a href="${resultado.url}" target="_blank">🔗 ${resultado.url}</a>
                        </p>
                    `;
                } else {
                    textoStatus.innerText = '❌ Erro no Servidor';
                    containerLink.innerHTML = `<span style="color: #ff5252;">${resultado.error || 'Erro desconhecido'}</span>`;
                }
            } catch (erro) {
                console.error('Erro no Deploy:', erro);
                textoStatus.innerText = '❌ Falha de Rede';
                containerLink.innerHTML = `<span style="color: #ff5252;">Não foi possível contactar o servidor. Vê se o terminal está ativo!</span>`;
            }
        }

        // ============================================
        // SISTEMA DO CHAT CONVENCIONAL
        // ============================================
        async function enviarComando() {
            const measurement = chatInput.value;
            const mensagem = measurement ? measurement.trim() : "";
            if (!mensagem) return;

            addMessage('user', message = mensagem);
            chatInput.value = '';
            statusBar.innerText = '⏳ Pensando...';

            try {
                const resposta = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: mensagem })
                });
                const dados = await resposta.json();
                addMessage('ai', dados.text || dados.response);
                statusBar.innerText = '🚀 Anthost Pages | Pronto';
            } catch (erro) {
                addMessage('ai', '❌ Erro ao comunicar com a IA no backend.');
                statusBar.innerText = '❌ Erro';
            }
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.classList.add('message', sender);
            div.innerHTML = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                enviarComando();
            }
        });
    </script>
</body>
</html>
